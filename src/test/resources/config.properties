# ==========================================
# SauceDemo Automation - Configuration File
# ==========================================

# --- Environments ---
staging.url=https://www.saucedemo.com
prod.url=https://www.saucedemo.com

# --- SauceDemo Test Credentials ---
valid.username=standard_user
valid.password=secret_sauce
locked.username=locked_out_user
problem.username=problem_user
performance.username=performance_glitch_user
error.username=error_user
visual.username=visual_user

# --- Browser Settings ---
# Overridden by -Dbrowser=chrome|firefox at runtime
browser=chrome
headless=true

# --- Wait Timeouts (seconds) ---
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# --- Screenshot ---
screenshot.on.failure=true
screenshot.dir=target/screenshots/

# --- Reporting ---
report.dir=target/ExtentReports/
