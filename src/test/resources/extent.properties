# ==========================================
# Extent Reports Configuration
# ==========================================

# Spark Reporter (interactive HTML5 report)
extent.reporter.spark.start=true
extent.reporter.spark.out=target/ExtentReports/SparkReport.html

# Classic HTML Reporter
extent.reporter.html.start=true
extent.reporter.html.out=target/ExtentReports/index.html

# Screenshot settings
screenshot.dir=target/ExtentReports/screenshots/
screenshot.rel.path=screenshots/

# Attach screenshot on failure only
extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log

# System info shown in report header
extent.enable.systeminfo=true
systeminfo.Project=SauceDemo Automation
systeminfo.Module=E2E Regression
systeminfo.AppURL=https://www.saucedemo.com
systeminfo.Framework=Selenium + Cucumber + TestNG
